<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregunta {{ numero }} de 24</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px;">
    <div style="background: white; max-width: 700px; margin: 40px auto; padding: 35px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
        <div style="display: flex; justify-content: space-between; color: #7f8c8d; font-size: 0.9em; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
            <span>Escenario {{ numero }} de 24</span>
            <span style="background: #e8f4fd; color: #3498db; padding: 2px 8px; border-radius: 4px; font-weight: bold;">Filtro: {{ elemento }}</span>
        </div>
        
        <p style="color: #2c3e50; font-size: 1.2em; line-height: 1.6; margin-bottom: 30px;"><strong>{{ escenario }}</strong></p>
        
        <form method="POST">
            {% for clave, valor in opciones %}
                <div style="margin-bottom: 18px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; transition: all 0.2s;">
                    <label style="display: flex; align-items: flex-start; cursor: pointer; color: #334155; line-height: 1.5;">
                        <input type="radio" name="opcion" value="{{ clave }}" required style="margin-top: 4px; margin-right: 12px; min-width: 16px;"> 
                        <span>{{ valor }}</span>
                    </label>
                </div>
            {% endfor %}
            <br>
            <button type="submit" style="background-color: #2ecc71; color: white; border: none; padding: 14px 35px; font-size: 1em; border-radius: 6px; cursor: pointer; float: right; font-weight: bold;">Siguiente Pregunta →</button>
            <div style="clear: both;"></div>
        </form>
    </div>
</body>
</html>
